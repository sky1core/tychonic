version: tychonic.config.v1
states:
  work:
    type: work
    agent: claude
    command: claude --print --output-format stream-json --verbose
    resume_command: claude --continue --print --output-format stream-json --verbose
    timeout: 45m
  verify:
    type: verify
    command: npm test
    timeout: 20m
  review:
    type: review
    agent: claude
    command: claude --print --output-format stream-json --verbose
    emits:
      - tychonic.review.v1
    timeout: 20m
policies:
  loop:
    auto_continue: true
    max_review_iterations: 3
  integration:
    mode: disabled
    position: final_gate
