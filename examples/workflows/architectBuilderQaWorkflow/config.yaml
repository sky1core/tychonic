version: tychonic.config.v1

policies:
  interaction:
    mode: interactive
    max_reject_iterations: 5

states:
  architect:
    type: work
    agent: claude
    command: claude -p
    resume_command: claude --resume -p
    timeout: 30m
    permission_mode: plan
  builder:
    type: work
    agent: codex
    command: codex exec --skip-git-repo-check --json -
    resume_command: codex exec resume --skip-git-repo-check --json -
    timeout: 60m
    sandbox: workspace-write
    approval: never
  qa:
    type: review
    agent: claude
    command: claude -p
    timeout: 30m
    emits:
      - tychonic.review.v1
